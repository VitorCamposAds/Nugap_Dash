<style>
:root,[data-theme=light]{
  --bg:#f5f4f0;--surface:#fdfcf9;--surface2:#f0ede7;--text:#1a1a2e;
  --muted:#6b7280;--faint:#b0aaa0;--border:#e0dbd2;
  --primary:#01696f;--primary-light:rgba(1,105,111,.12);
  --accent:#c8870a;--accent-light:rgba(200,135,10,.1);
  --good:#2e7d32;--good-light:rgba(46,125,50,.12);
  --warn:#b45309;--warn-light:rgba(180,83,9,.1);
  --shadow:0 2px 8px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.06);
  --radius:16px;
}
[data-theme=dark]{
  --bg:#0f0f12;--surface:#18181c;--surface2:#1e1e24;--text:#e8e8ec;
  --muted:#9ca3af;--faint:#4b5563;--border:#2a2a32;
  --primary:#3d9ea8;--primary-light:rgba(61,158,168,.12);
  --accent:#f0a832;--accent-light:rgba(240,168,50,.1);
  --good:#5cb85c;--good-light:rgba(92,184,92,.1);
  --warn:#f59e0b;--warn-light:rgba(245,158,11,.1);
  --shadow:0 2px 8px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.3);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);line-height:1.55}
.header{position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);padding:0 20px}
[data-theme=light] .header{background:rgba(245,244,240,.9);backdrop-filter:blur(14px)}
[data-theme=dark] .header{background:rgba(15,15,18,.9);backdrop-filter:blur(14px)}
.header-inner{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:14px 0;gap:12px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:10px}
.logo svg{flex-shrink:0}
.logo-text{font-size:.95rem;font-weight:700;letter-spacing:-.01em}
.logo-sub{font-size:.75rem;color:var(--muted);font-weight:400}
.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:8px 14px;border-radius:10px;font-size:.85rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{opacity:.88}
.tabs-bar{border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto}
.tabs-inner{max-width:1440px;margin:0 auto;display:flex;gap:2px;padding:0 0 0 0}
.tab-btn{padding:11px 16px;font-size:.85rem;font-weight:600;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-btn:hover:not(.active){color:var(--text)}
.page{display:none;max-width:1440px;margin:0 auto;padding:24px 20px 60px}
.page.active{display:block}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:24px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow)}
.kpi-label{font-size:.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.kpi-val{font-size:2rem;font-weight:800;letter-spacing:-.03em;line-height:1}
.kpi-sub{font-size:.75rem;color:var(--muted);margin-top:5px}
.kpi-acc{color:var(--primary)}
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g2l{grid-template-columns:2fr 1fr}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.card-title{font-size:.9rem;font-weight:700;margin-bottom:16px;color:var(--text)}
.chart-wrap{position:relative;height:300px;width:100%}
.note{border-left:3px solid var(--accent);padding:10px 14px;background:var(--accent-light);border-radius:8px;margin-top:12px;font-size:.84rem}
.note strong{color:var(--accent)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{padding:9px 12px;text-align:left;font-size:.75rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:2px solid var(--border)}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:top}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:.74rem;font-weight:700}
.b-ok{background:var(--good-light);color:var(--good)}
.b-partial{background:var(--accent-light);color:var(--accent)}
.section-title{font-size:1.3rem;font-weight:800;margin-bottom:20px;letter-spacing:-.02em}
.alavanca-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px}
.alav-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
.alav-titulo{font-size:.95rem;font-weight:700}
.alav-badges{display:flex;gap:6px;flex-shrink:0}
.alav-metrica{font-size:.8rem;color:var(--muted);background:var(--surface2);padding:4px 10px;border-radius:6px;display:inline-block}
.alav-desc{font-size:.84rem;color:var(--muted)}
.alav-acao{font-size:.84rem;border-left:3px solid var(--primary);padding-left:10px;color:var(--text)}
.alav-acao strong{color:var(--primary)}
.imp-alto{background:var(--good-light);color:var(--good)}
.imp-medio{background:var(--accent-light);color:var(--accent)}
.urg-imm{background:rgba(239,68,68,.1);color:#dc2626}
[data-theme=dark] .urg-imm{color:#f87171}
.urg-curto{background:var(--accent-light);color:var(--accent)}
.urg-medio{background:var(--primary-light);color:var(--primary)}
.divider{height:1px;background:var(--border);margin:6px 0}
@media(max-width:900px){.g2,.g3,.g2l{grid-template-columns:1fr}.chart-wrap{height:240px}}
</style>
</head>

const TABS = [
  {id:'overview',   label:'Visão Geral'},
  {id:'acquisition',label:'Aquisição'},
  {id:'retention',  label:'Retenção'},
  {id:'referral',   label:'Referral'},
  {id:'content',    label:'Conteúdo & Páginas'},

  {id:'governance', label:'Cobertura de Métricas'},
];

const tabsInner = document.getElementById('tabsInner');
const pagesEl = document.getElementById('pages');

TABS.forEach((t,i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i===0?' active':'');
  btn.textContent = t.label;
  btn.dataset.target = t.id;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(t.id).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
  });
  tabsInner.appendChild(btn);

  const page = document.createElement('div');
  page.className = 'page' + (i===0?' active':'');
  page.id = t.id;
  pagesEl.appendChild(page);
});

function table(rows, cols) {
  if(!rows||!rows.length) return '<p style="color:var(--muted);padding:12px">Sem dados</p>';
  return `<div class='tbl-wrap'><table><thead><tr>${cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${r[c]??''}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;
}

function badge(cls, txt) { return `<span class='badge ${cls}'>${txt}</span>`; }

function impBadge(v) { return v==='Alto'? badge('b-ok',v): badge('b-partial',v); }
function urgBadge(v) {
  if(v&&v.startsWith('Imediato')) return badge('urg-imm','Imediato');
  if(v&&v.startsWith('Curto')) return badge('urg-curto','Curto prazo');
  return badge('urg-medio','Médio prazo');
}
function covBadge(v) {
  if(v==='Disponível') return badge('b-ok','Disponível');
  if(v&&v.includes('proxy')) return badge('b-partial','Proxy');
  if(v&&v.includes('baixo')) return badge('b-partial','Baixo volume');
  return badge('b-partial','Parcial');
}

// Build colors helper
function getVar(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

// CHART REGISTRY for theme updates
const chartRegistry = {};
function registerChart(id, cfg) {
  if(chartRegistry[id]) chartRegistry[id].destroy();
  const canvas = document.getElementById(id);
  if(!canvas) return;
  chartRegistry[id] = new Chart(canvas, cfg);
}

function commonOpts(extra) {
  return Object.assign({
    responsive:true,
    maintainAspectRatio:false,
    plugins:{legend:{labels:{color:getVar('--muted'),font:{size:12,family:'Inter'}}}},
    scales:{
      x:{ticks:{color:getVar('--muted'),font:{size:11}},grid:{color:getVar('--border')+''+'40'}},
      y:{ticks:{color:getVar('--muted'),font:{size:11}},grid:{color:getVar('--border')+''+'40'}}
    }
  }, extra||{});
}

function donutOpts() {
  return {responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:getVar('--muted'),font:{size:11}}}}};
}

  registerChart('refBar',{type:'bar',data:{labels:['Referral canal','chatgpt.com','gemini.google.com'],datasets:[{label:'Usuários/sessões',data:[DATA.summary.referral,2,1],backgroundColor:['#01696f','#3d9ea8','#c8870a'],borderRadius:6}]},options:commonOpts()});
}

function buildContent() {
  document.getElementById('content').innerHTML = `
    <div class='section-title'>Conteúdo & Páginas</div>
    <div class='card' style='margin-bottom:16px'><div class='card-title'>Top 10 páginas por visualização</div><div class='chart-wrap'><canvas id='pagesBar'></canvas></div></div>
    <div class='grid g2'>
      <div class='card'><div class='card-title'>Tabela de páginas</div>${table(DATA.pages,['Caminho da página e classe da tela','Visualizações','Usuários ativos','Tempo médio de engajamento por usuário ativo'])}</div>
      <div class='card'>
        <div class='card-title'>Insights</div>
        <p style='font-size:.84rem;color:var(--muted);margin-bottom:10px'>Home e /agua/ concentram quase metade das visualizações. O conteúdo sobre café tem alto engajamento (34.9s), e a página institucional /a-nugap/ apresenta o maior tempo de leitura (44.9s).</p>
        <div class='note' style='margin-bottom:10px'><strong>Oportunidade:</strong> Inserir CTAs de orçamento em /agua/, /cafe/ e /credenciamento/, que são as páginas com maior intenção de compra potencial.</div>
        <div class='note'><strong>Contato:</strong> Apenas ${DATA.summary.contact_views} views na página /contato/ — o funil vaza antes do ponto de conversão.</div>
      </div>
    </div>
  `;
  const pg = DATA.pages.slice(0,10);
  registerChart('pagesBar',{type:'bar',data:{labels:pg.map(r=>r['Caminho da página e classe da tela']),datasets:[{label:'Visualizações',data:pg.map(r=>r['Visualizações']),backgroundColor:getVar('--primary'),borderRadius:5}]},options:commonOpts({indexAxis:'y'})});
}

function buildTechGeo() {
  document.getElementById('techgeo').innerHTML = `
    <div class='section-title'>Tecnologia & Geografia</div>
    <div class='grid g3' style='margin-bottom:16px'>
      <div class='card'><div class='card-title'>Dispositivos</div><div class='chart-wrap'><canvas id='devChart'></canvas></div></div>
      <div class='card'><div class='card-title'>Navegadores</div><div class='chart-wrap'><canvas id='brwChart'></canvas></div></div>
      <div class='card'><div class='card-title'>Sistemas operacionais</div><div class='chart-wrap'><canvas id='osChart'></canvas></div></div>
    </div>
    <div class='grid g2'>
      <div class='card'><div class='card-title'>Top cidades</div>${table(DATA.cities,['Cidade','Usuários ativos'])}</div>
      <div class='card'><div class='card-title'>Países</div>${table(DATA.countries,['País','Usuários ativos','Novos usuários','Sessões engajadas','Taxa de engajamento'])}</div>
    </div>
  `;
  const devc = ['#01696f','#c8870a','#7a39bb','#964219','#3d9ea8'];
  const dv = DATA.devices.map(r=>Object.values(r));
  registerChart('devChart',{type:'doughnut',data:{labels:dv.map(r=>r[0]),datasets:[{data:dv.map(r=>r[1]),backgroundColor:devc,borderWidth:0}]},options:donutOpts()});
  const br = DATA.browsers.map(r=>Object.values(r));
  registerChart('brwChart',{type:'bar',data:{labels:br.map(r=>r[0]),datasets:[{label:'Usuários',data:br.map(r=>r[1]),backgroundColor:'#3d9ea8',borderRadius:5}]},options:commonOpts()});
  const os = DATA.os.map(r=>Object.values(r));
  registerChart('osChart',{type:'bar',data:{labels:os.map(r=>r[0]),datasets:[{label:'Usuários',data:os.map(r=>r[1]),backgroundColor:'#c8870a',borderRadius:5}]},options:commonOpts()});
}

function buildAlavancas() {
  const cards = DATA.alavancas.map((a,i) => `
    <div class='alavanca-card'>
      <div class='alav-header'>
        <div class='alav-titulo'>${i+1}. ${a.titulo}</div>
        <div class='alav-badges'>${impBadge(a.impacto)} ${urgBadge(a.urgencia)}</div>
      </div>
      <div class='alav-metrica'>📊 ${a.metricas}</div>
      <div class='alav-desc'>${a.descricao}</div>
      <div class='divider'></div>
      <div class='alav-acao'><strong>Ação recomendada:</strong> ${a.acao}</div>
    </div>
  `).join('');
  document.getElementById('alavancas').innerHTML = `
    <div class='section-title'>🔑 Alavancas de Negócio</div>
    <p style='font-size:.875rem;color:var(--muted);margin-bottom:20px'>Oportunidades identificadas com base nos dados disponíveis do GA4. Ordenadas por impacto e urgência de execução.</p>
    <div class='grid g2'>${cards}</div>
    <div class='card' style='margin-top:16px'>
      <div class='card-title'>Resumo de impacto × urgência</div>
      <div class='chart-wrap'><canvas id='alavChart'></canvas></div>
    </div>
  `;
  registerChart('alavChart',{type:'bar',data:{
    labels:DATA.alavancas.map(a=>a.titulo.substring(0,35)+'…'),
    datasets:[
      {label:'Impacto (Alto=2, Médio=1)',data:DATA.alavancas.map(a=>a.impacto==='Alto'?2:1),backgroundColor:'#01696f',borderRadius:5},
      {label:'Urgência (Imediato=3, Curto=2, Médio=1)',data:DATA.alavancas.map(a=>a.urgencia.startsWith('Imediato')?3:a.urgencia.startsWith('Curto')?2:1),backgroundColor:'#c8870a',borderRadius:5}
    ]
  },options:commonOpts()});
}

function buildGovernance() {
  const rows = DATA.governance.map(r=>`
    <tr>
      <td><strong>${r.Etapa}</strong></td>
      <td>${r.Metrica}</td>
      <td>${covBadge(r.Status)}</td>
      <td style='color:var(--muted);font-size:.82rem'>${r.Dados}</td>
    </tr>
  `).join('');
  document.getElementById('governance').innerHTML = `
    <div class='section-title'>Cobertura de Métricas · Proposta AARRR</div>
    <p style='font-size:.875rem;color:var(--muted);margin-bottom:20px'>Apenas as métricas que podem ser medidas com os dados disponíveis. Indicadores sem cobertura (Ativação, Revenue, NPS) foram removidos até que a instrumentação seja implementada.</p>
    <div class='card' style='margin-bottom:16px'>
      <div class='tbl-wrap'><table>
        <thead><tr><th>Etapa</th><th>Métrica</th><th>Status</th><th>Dados disponíveis</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>
    <div class='grid g3'>
      <div class='card'>
        <div class='card-title' style='color:var(--good)'>✅ O que está coberto</div>
        <p style='font-size:.84rem;color:var(--muted)'>Aquisição por canal, tráfego, top páginas, geografia, dispositivos, navegadores, usuários recorrentes (proxy) e taxa de rejeição.</p>
      </div>
      <div class='card'>
        <div class='card-title' style='color:var(--accent)'>⚠️ Coberto por proxy</div>
        <p style='font-size:.84rem;color:var(--muted)'>Retenção digital (retorno ao site, não retorno de clientes ao laboratório) e sinais fracos de referral via IA.</p>
      </div>
      <div class='card'>
        <div class='card-title' style='color:var(--muted)'>🔧 Requer instrumentação</div>
        <p style='font-size:.84rem;color:var(--muted)'>Conversão visita→lead, lead→cliente, orçamento aprovado, receita, LTV, MRR, churn real e NPS.</p>
      </div>
    </div>
  `;
}

// INITIALIZE
buildOverview();
buildAcquisition();
buildRetention();
buildReferral();
buildContent();
buildTechGeo();
buildAlavancas();
buildGovernance();

// THEME TOGGLE
document.getElementById('themeBtn').addEventListener('click', () => {
  const root = document.documentElement;
  const isDark = root.getAttribute('data-theme') === 'dark';
  root.setAttribute('data-theme', isDark?'light':'dark');
  document.getElementById('themeBtn').textContent = isDark ? '☾ Tema' : '☀ Tema';
  // rebuild all charts with new colors
  const activeId = document.querySelector('.page.active').id;
  if(activeId==='overview') buildOverview();
  else if(activeId==='acquisition') buildAcquisition();
  else if(activeId==='retention') buildRetention();
  else if(activeId==='referral') buildReferral();
  else if(activeId==='content') buildContent();
  else if(activeId==='techgeo') buildTechGeo();
  else if(activeId==='alavancas') buildAlavancas();
  else if(activeId==='governance') buildGovernance();
});
</script>
</body></html>
